<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>About Junimeek!</title>
        <link rel="stylesheet" href="./style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="icon" href="https://junimeek.net/resources/favicon.ico" type="image/vnd.microsoft.icon">
    </head>

    <style>
        :root {
            --sayacolor-bg: aliceblue;
            --sayacolor-font: black;
        }

        .sayaka {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0px;
            padding: 0px;
        }

        .sayacontent-body {
            background-color: var(--sayacolor-bg);
            width: 100vw;
            min-height: 100vh;
        }
    </style>

    <script>
        let sayaRoot = document.querySelector(":root");

        function ChangeBackgroundColor()
        {
            sayaRoot.style.setProperty("--sayacolor-bg", "red");
        }
    </script>

    <body class="sayaka" style="background-color: brown;" onload="ChangeBackgroundColor()">
        <div class="sayacontent-body">

        </div>
    </body>
