<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Homura-chan!</title>
        <link rel="icon" href="https://junimeek.net/resources/favicon.ico" type="image/vnd.microsoft.icon">
    </head>

    <style>
        * {
            margin: 0px;
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'meguca';
            font-weight: normal;
            font-style: normal;
            src: url('./meguca.otf') format('opentype');
        }

        body {
            background-image: url('./coolhomura.webp');
            background-size: cover;
            background-position: center;
            backdrop-filter: blur(20px);
        }

        .homubg {
            background-image: url('./coolhomura.webp');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            height: 100vh;
            width: 100vw;
        }

        .titel {
            color: white;
            font-size: 67pt;
            margin-left: 10%;
            font-family: serif;
        }

        p {
            color: white;
            font-size: 40pt;
            font-family: sans-serif;
        }

        .megucafont {
            font-family: 'meguca', sans-serif;
            font-size: 69pt;
            padding: 0px;
        }

        .luminous {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .luminous img {
            padding-top: 100px;
            width: 200px;
            height: 100%;
        }

        .thelink {
            font-family: sans-serif;
            font-size: 16pt;
            color: white;
            position: fixed;
            bottom: 15px;
            right: 15px;
        }
    </style>
    
    <body>
        <div class="homubg">
            <h1 class="titel">Homura Akemi</h1>
            <p>making magical girls
                <div class="megucafont" style="display: inherit; margin-left: 1.2em;">
                    <span style="color: #c53d1d;">G</span>
                    <span style="color: #ffffff;">A</span>
                    <span style="color: #c568a1;">Y</span>
                </div>        
            </p>
            <p style="margin-left: 2em; font-style: italic;">since 2011</p>

            <div class="luminous">
                <img src="./luminous.gif">
            </div>

            <div class="thelink">
                <span>bg source <a href="https://twitter.com/i/status/2037061578080801159" style="color: cyan; padding-right: 8px;">here</a></span>
            </div>
        </div>
    </body>
</html>
